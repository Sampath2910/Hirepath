spring.application.name=hirepath-ai-backend

# Active profile - defaults to 'local' for local development.
# On Render, this can be set to 'prod' or left blank since env vars will override everything.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =============================================================
# DATABASE CONFIGURATION
# =============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./hirepath_data;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security Configuration (Development — Permit All)
spring.security.user.name=admin
spring.security.user.password=admin

# File Upload Limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port
server.port=${PORT:8080}

# =============================================================
# AI API KEYS — Set as environment variables in production!
# =============================================================
claude.api.key=${CLAUDE_API_KEY:}
claude.api.url=https://api.anthropic.com/v1/messages

# Gemini API Configuration (Fallback for AI)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent

# Adzuna Job API
adzuna.app.id=${ADZUNA_APP_ID:}
adzuna.app.key=${ADZUNA_APP_KEY:}

# Reed.co.uk API (UK jobs only)
reed.api.key=${REED_API_KEY:}

# Spring WebClient Config
spring.codec.max-in-memory-size=2MB
