version: '3.8'

services:
  # =============================================================
  # MySQL Database Container
  # =============================================================
  mysql:
    image: mysql:8.0
    container_name: hirepath-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hirepath_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  # =============================================================
  # Spring Boot Backend Container
  # =============================================================
  backend:
    build:
      context: ./hirepath/backend
      dockerfile: Dockerfile
    container_name: hirepath-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/hirepath_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQL8Dialect
      # Pass API Keys via environment variables
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - REED_API_KEY=${REED_API_KEY:-}
    depends_on:
      - mysql

  # =============================================================
  # Next.js Frontend Container
  # =============================================================
  frontend:
    build:
      context: ./hirepath/frontend
      dockerfile: Dockerfile
    container_name: hirepath-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  mysql-data:
